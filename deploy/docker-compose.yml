version: '3.8'

# ============================================================
# 企业AI知识库系统 — 完整服务编排
# 启动顺序：基础设施 → backend(含迁移) → 前端/反代
# ============================================================

services:

  # ── 反向代理 ────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  # ── 前端（Vite 静态构建 + nginx 服务） ──────────────────
  frontend:
    build:
      context: ../mykbase
      dockerfile: Dockerfile.prod
    restart: unless-stopped

  # ── 后端 API ─────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ${HOST_UPLOAD_DIR:-/data/uploads}:/app/uploads
      - ${HOST_WATCH_DIR:-/data/watch}:/mnt/nas:ro
      - ${HOST_MODEL_DIR:-/data/models}:/models:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      milvus:
        condition: service_started
      meilisearch:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped

  # ── Celery 异步任务 Worker ────────────────────────────────
  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    volumes:
      - ${HOST_UPLOAD_DIR:-/data/uploads}:/app/uploads
      - ${HOST_WATCH_DIR:-/data/watch}:/mnt/nas:ro
      - ${HOST_MODEL_DIR:-/data/models}:/models:ro
    depends_on:
      - backend
    restart: unless-stopped

  # ── Celery Beat 定时任务 ──────────────────────────────────
  celery_beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      - backend
    restart: unless-stopped

  # ── MySQL 8.0 ────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-knowledge_base}
      MYSQL_USER: ${MYSQL_USER:-kb_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1",
             "-u", "root", "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  # ── Redis 7 ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ── MinIO（对象存储，同时供 Milvus 和应用使用） ──────────
  minio:
    image: minio/minio:RELEASE.2024-06-04T19-20-08Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    ports:
      - "9001:9001"      # MinIO 管理控制台（可选）
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  # ── etcd（Milvus 依赖的元数据存储） ──────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command: >
      etcd
      --advertise-client-urls=http://127.0.0.1:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    restart: unless-stopped

  # ── Milvus 向量数据库（Standalone） ──────────────────────
  milvus:
    image: milvusdb/milvus:v2.4.5
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_NAME: milvus-bucket
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    restart: unless-stopped

  # ── MeiliSearch 全文搜索 ──────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.6
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  minio_data:
  etcd_data:
  milvus_data:
  meili_data:
